<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAM Parking Application</title>
    <style>
        body { font-family: sans-serif; background: #1a2a3a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .form-container { background: white; color: #333; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #1a2a3a; margin-bottom: 25px; font-size: 24px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #c5a059; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>🚗 駐車申請 (FAM)</h1>
        <form action="/submit" method="post" enctype="multipart/form-data">
            <label>会社名</label>
            <input type="text" name="company" placeholder="例：株式会社テック" required>
            <label>お名前</label>
            <input type="text" name="name" placeholder="例：山田 太郎" required>
            <label>車両番号</label>
            <input type="text" name="car_number" placeholder="例：群馬 500 あ 12-34" required>
            <label>車両写真</label>
            <input type="file" name="photo" accept="image/*" capture="environment" required>
            <button type="submit">申請を送信する</button>
        </form>
    </div>
</body>
</html>
