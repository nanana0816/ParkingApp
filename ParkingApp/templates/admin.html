<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>Admin Panel</title></head>
<body style="font-family:sans-serif; padding:20px;">
    <h1>駐車申請 管理パネル</h1>
    <table border="1" style="width:100%; border-collapse: collapse; text-align: left;">
        <tr style="background:#eee;">
            <th>ID</th><th>日時</th><th>会社名</th><th>氏名</th><th>車両</th><th>写真</th><th>状態</th><th>操作</th>
        </tr>
        {% for row in requests %}
        <tr>
            <td>{{ row[0] }}</td><td>{{ row[1] }}</td><td>{{ row[2] }}</td><td>{{ row[3] }}</td><td>{{ row[4] }}</td>
            <td><a href="https://{{ account_name }}.blob.core.windows.net/uploads/{{ row[5] }}" target="_blank">📸表示</a></td>
            <td>{{ row[6] }}</td>
            <td>
                {% if row[6] == "pending" %}
                <form action="/admin/approve/{{ row[0] }}" method="post">
                    <button type="submit" style="background: #2c3e50; color:white; border:none; cursor:pointer;">承認する</button>
                </form>
                {% else %} ✅済み {% endif %}
            </td>
        </tr>
        {% endfor %}
    </table>
  <hr>
<div style="text-align: center; margin-top: 20px; font-size: 0.9em; color: #555;">
    <p>データ最終更新 (Azure): {{ last_modified }}</p>
    <p>画面自動更新時刻: <span id="update-time"></span></p>
</div>

<script>
    // 画面が読み込まれた時刻を表示
    const now = new Date();
    document.getElementById('update-time').innerText = now.toLocaleTimeString();

    // 30秒ごとに自動リロード
    setTimeout(() => {
        location.reload();
    }, 30000);
</script>
</body>
</html>
